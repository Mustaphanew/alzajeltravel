name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (prod)
        run: flutter build web --release --base-href "/alzajeltravel/" --dart-define=FLAVOR=prod --dart-define=FIREBASE_WEB_VAPID_KEY=BDmqRXB9xm4bgP7UUfKAXyuj-g654iFLYM30RgsU_WOvghiOxy7-btJq4FbTgVHKFuFxQI2KaI7rcg0UYom2INM

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
